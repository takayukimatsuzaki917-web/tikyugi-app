<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport の設定：
    - width=device-width: 画面幅をデバイスの実際の幅に合わせる
    - initial-scale=1.0: 最初の表示倍率を1倍（等倍）にする
    - user-scalable=no: ピンチ操作でのズームを無効にする
      （3歳児が誤ってズームしてしまうのを防ぐため）
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>せかいのちず</title>
  <!-- アプリのスタイルシートを読み込む -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ========== ローディング画面 ========== -->
  <!--
    地球儀の描画が完了するまでの間、「よみこみちゅう...」と表示する。
    JavaScriptで地球儀の準備ができたら、この要素を非表示にする。
  -->
  <div id="loading">
    <div class="loading-icon">🌍</div>
    <div class="loading-text">よみこみちゅう...</div>
  </div>

  <!-- ========== 地球儀の表示エリア ========== -->
  <!--
    globe.gl ライブラリがこの div の中に Three.js の canvas を自動的に作成し、
    3D地球儀を描画する。
    id="globe-container" はJavaScript側からこの要素を特定するために使う。
  -->
  <div id="globe-container"></div>

  <!-- ========== 国情報カード（下部に固定表示） ========== -->
  <!--
    国のマーカーをタップしたときに、この「カード」が画面下部に表示される。
    最初は非表示（JavaScriptで制御）。
    id="country-card" はJavaScript側からこの要素を特定するために使う。
  -->
  <div id="country-card" class="hidden">
    <!-- カードを閉じるボタン（×ボタン） -->
    <button id="close-btn" aria-label="とじる">✕</button>

    <!-- 国旗画像 -->
    <img id="flag-img" src="" alt="こっき" />

    <!-- 国情報テキストエリア -->
    <div id="country-info">
      <!-- 国名（ひらがな or カタカナ） -->
      <div class="info-row">
        <span class="info-label">くにのなまえ</span>
        <span id="country-name" class="info-value"></span>
      </div>
      <!-- 首都名（ひらがな or カタカナ） -->
      <div class="info-row">
        <span class="info-label">しゅと</span>
        <span id="capital-name" class="info-value"></span>
      </div>
    </div>
  </div>

  <!--
    importmap：モジュール名 "three" を ES Module の URL に対応させる。
    globe.gl 2.46.1 は three >= 0.179 を要件とするため 0.184 を使用。
    three@0.184.0 以降は UMD ビルド（three.min.js）が廃止されたため、
    ES Module（three.module.min.js）をモジュールとして import する方式を採用。
  -->
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.184.0/build/three.module.min.js" } }
  </script>

  <!--
    globe.gl ライブラリを CDN から読み込む（従来通りグローバルスクリプト）。
    Three.js + d3-geo をベースにした3D地球儀ライブラリで、
    マウスドラッグ・タッチ操作による回転が標準でサポートされている。
  -->
  <script src="https://unpkg.com/globe.gl"></script>

  <!--
    globe.js を ES Module として読み込む。
    type="module" にすることで、globe.js 内で import * as THREE from 'three' が使える。
    モジュールスクリプトは自動的に defer（遅延実行）になるため、
    DOM が構築された後・DOMContentLoaded の前に実行される。
  -->
  <script type="module" src="/static/js/globe.js"></script>

</body>
</html>
